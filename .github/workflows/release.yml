name: Release Courseware
on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live & Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk

      - name: Compile all modules sequentially
        shell: bash
        run: |
          MODULES=(
            模块0_导学
            模块1_数据结构
            模块2_计算机组成原理
            模块3_操作系统
            模块4_计算机网络
            模块5_四科串联总结
          )
          mkdir -p ./pdfs
          for module in "${MODULES[@]}"; do
            echo ""
            echo "============================================"
            echo "  Compiling: $module"
            echo "============================================"
            cd "$module"
            for f in *.tex; do
              echo "--- $f ---"
              latexmk -xelatex -interaction=nonstopmode "$f" && echo "OK: $f" || echo "FAIL: $f"
            done
            cp *.pdf ../pdfs/ 2>/dev/null || true
            cd ..
          done
          echo ""
          echo "============================================"
          echo "  Done. Total PDFs: $(ls pdfs/*.pdf | wc -l)"
          echo "============================================"

      - name: Generate release notes
        shell: bash
        run: |
          DATE=$(date '+%Y-%m-%d')
          cat > ./release-notes.md << EOF
          # 408考研零基础课程课件

          > 发布日期：$DATE

          | 模块 | 集数 |
          |------|:----:|
          | 模块0_导学 | 4 集 |
          | 模块1_数据结构 | 18 集 |
          | 模块2_计算机组成原理 | 20 集 |
          | 模块3_操作系统 | 16 集 |
          | 模块4_计算机网络 | 14 集 |
          | 模块5_四科串联总结 | 4 集 |
          | **合计** | **76 集** |
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          body_path: ./release-notes.md
          files: ./pdfs/*.pdf

      - name: Create Release (manual)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag }}
          body_path: ./release-notes.md
          files: ./pdfs/*.pdf
