name: Release Courseware
on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-texlive-v1

      - name: Install TeX Live & tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk \
            poppler-utils

      - name: Compile all lessons and merge per module
        shell: bash
        run: |
          set -e
          mkdir -p ./release
          FAILED=""
          MODULES=(
            "模块0_导学"
            "模块1_数据结构"
            "模块2_计算机组成原理"
            "模块3_操作系统"
            "模块4_计算机网络"
            "模块5_四科串联总结"
          )

          for module in "${MODULES[@]}"; do
            echo ""
            echo "============================================"
            echo "  Module: $module"
            echo "============================================"
            cd "$module"

            # Compile all lesson PDFs in this module
            module_pdfs=()
            for f in ppt_*.tex; do
              echo "--- $f ---"
              latexmk -xelatex -interaction=nonstopmode "$f" && echo "OK: $f" || { echo "FAIL: $f"; FAILED="$FAILED $f"; }
              pdf="${f%.tex}.pdf"
              if [[ -f "$pdf" ]]; then
                module_pdfs+=("$pdf")
              fi
            done

            cd ..

            # Merge into module PDF
            if [[ ${#module_pdfs[@]} -gt 0 ]]; then
              echo "Merging ${#module_pdfs[@]} PDFs for $module"
              pdfunite "${module_pdfs[@]/#/$module/}" "./release/${module}.pdf"
              echo "  -> ./release/${module}.pdf"
            else
              echo "  -> NO PDFs for $module"
            fi
          done

          # Merge all module PDFs into all-in-one
          echo ""
          echo "============================================"
          echo "  Merging: 全系列合集"
          echo "============================================"
          module_pdfs=()
          for module in "${MODULES[@]}"; do
            pdf="./release/${module}.pdf"
            if [[ -f "$pdf" ]]; then
              module_pdfs+=("$pdf")
            fi
          done
          if [[ ${#module_pdfs[@]} -gt 0 ]]; then
            pdfunite "${module_pdfs[@]}" "./release/全系列合集.pdf"
            echo "  -> ./release/全系列合集.pdf"
          fi

          echo ""
          echo "============================================"
          echo "  Output PDFs:"
          ls -lh ./release/
          echo "============================================"

          if [[ -n "$FAILED" ]]; then
            echo ""
            echo "*** COMPILATION FAILURES: $FAILED ***"
            exit 1
          fi

      - name: Generate release notes
        shell: bash
        run: |
          DATE=$(date '+%Y-%m-%d')
          cat > ./release-notes.md << EOF
          # 408考研零基础课程课件

          > 发布日期：$DATE
          > 格式：每模块一个合并 PDF + 全系列合集，覆盖全部 76 课时

          ## 文件清单

          $(for f in ./release/*.pdf; do name=$(basename "$f"); size=$(du -h "$f" | cut -f1); printf "| %s | %s |\n" "$name" "$size"; done)

          | 模块 | 集数 |
          |------|:----:|
          | 模块0_导学 | 4 集 |
          | 模块1_数据结构 | 18 集 |
          | 模块2_计算机组成原理 | 20 集 |
          | 模块3_操作系统 | 16 集 |
          | 模块4_计算机网络 | 14 集 |
          | 模块5_四科串联总结 | 4 集 |
          | **合计** | **76 集** |

          ---
          由 GitHub Actions 自动构建
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          body_path: ./release-notes.md
          files: ./release/*.pdf

      - name: Create Release (manual)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag }}
          body_path: ./release-notes.md
          files: ./release/*.pdf
