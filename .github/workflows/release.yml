name: Release Courseware
on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live & Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk

      - name: Compile release PDFs
        shell: bash
        run: |
          mkdir -p ./release

          # 1. compile per-module releases
          for f in release_模块*.tex; do
            echo ""
            echo "============================================"
            echo "  Compiling: $f"
            echo "============================================"
            latexmk -xelatex -interaction=nonstopmode "$f" && echo "OK: $f" || echo "FAIL: $f"
            base="${f%.tex}"
            pdf="${base}.pdf"
            module="${base#release_}"
            if [[ -f "$pdf" ]]; then
              cp "$pdf" "./release/${module}.pdf"
            fi
          done

          # 2. compile all-in-one release
          echo ""
          echo "============================================"
          echo "  Compiling: release.tex (全系列合集)"
          echo "============================================"
          latexmk -xelatex -interaction=nonstopmode release.tex && echo "OK: release.tex" || echo "FAIL: release.tex"
          if [[ -f "release.pdf" ]]; then
            cp "release.pdf" "./release/全系列合集.pdf"
          fi

          echo ""
          echo "============================================"
          echo "  Output PDFs:"
          ls -lh ./release/
          echo "============================================"

      - name: Generate release notes
        shell: bash
        run: |
          DATE=$(date '+%Y-%m-%d')
          cat > ./release-notes.md << EOF
          # 408考研零基础课程课件

          > 发布日期：$DATE
          > 格式：每模块一个合并 PDF + 全系列合集，覆盖全部 76 课时

          ## 文件清单

          $(for f in ./release/*.pdf; do name=$(basename "$f"); size=$(du -h "$f" | cut -f1); printf "| %s | %s |\n" "$name" "$size"; done)

          | 模块 | 集数 |
          |------|:----:|
          | 模块0_导学 | 4 集 |
          | 模块1_数据结构 | 18 集 |
          | 模块2_计算机组成原理 | 20 集 |
          | 模块3_操作系统 | 16 集 |
          | 模块4_计算机网络 | 14 集 |
          | 模块5_四科串联总结 | 4 集 |
          | **合计** | **76 集** |

          ---
          由 GitHub Actions 自动构建
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          body_path: ./release-notes.md
          files: ./release/*.pdf

      - name: Create Release (manual)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag }}
          body_path: ./release-notes.md
          files: ./release/*.pdf
