name: Release Courseware
on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-texlive-v1

      - name: Install TeX Live & tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk \
            poppler-utils

      - name: Compile all lessons and merge per module
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ./release
          FAILED=""
          MODULES=(
            "模块0_导学"
            "模块1_数据结构"
            "模块2_计算机组成原理"
            "模块3_操作系统"
            "模块4_计算机网络"
            "模块5_四科串联总结"
          )

          for module in "${MODULES[@]}"; do
            echo ""
            echo "============================================"
            echo "  Module: $module"
            echo "============================================"
            if [[ ! -d "$module" ]]; then
              echo "ERROR: Directory not found: $module"
              FAILED="$FAILED $module(dir)"
              continue
            fi
            cd "$module"
            for f in *.tex; do
              [[ -f "$f" ]] || continue
              echo "--- $f (pass 1/2) ---"
              log1=$(xelatex -extra-mem-top=50000000 -main-memory=50000000 -interaction=nonstopmode "$f" 2>&1)
              rc1=$?
              echo "--- $f (pass 2/2) ---"
              log2=$(xelatex -extra-mem-top=50000000 -main-memory=50000000 -interaction=nonstopmode "$f" 2>&1)
              rc2=$?
              if [[ $rc1 -eq 0 && $rc2 -eq 0 ]]; then
                echo "  OK: $f"
              else
                error=$(echo "$log2" | grep -a "^!" | head -5)
                echo "  FAIL: $f"
                echo "$error"
                FAILED="$FAILED $f"
                echo "=== $f ===" >> ../release/ERRORS.txt
                echo "$error" >> ../release/ERRORS.txt
              fi
            done
            cd ..
          done

          echo ""
          echo "============================================"
          echo "  Merging per-module PDFs"
          echo "============================================"
          for module in "${MODULES[@]}"; do
            if [[ ! -d "$module" ]]; then continue; fi
            pdfs=()
            for f in "$module"/*.pdf; do
              [[ -f "$f" ]] && pdfs+=("$f")
            done
            if [[ ${#pdfs[@]} -gt 0 ]]; then
              echo "  Merging ${#pdfs[@]} PDFs for $module"
              pdfunite "${pdfs[@]}" "./release/${module}.pdf" 2>&1 && echo "  -> ./release/${module}.pdf" || echo "  FAIL: pdfunite for $module"
            fi
          done

          echo ""
          echo "============================================"
          echo "  Merging: 全系列合集"
          echo "============================================"
          pdfs=()
          for module in "${MODULES[@]}"; do
            pdf="./release/${module}.pdf"
            [[ -f "$pdf" ]] && pdfs+=("$pdf")
          done
          if [[ ${#pdfs[@]} -gt 0 ]]; then
            pdfunite "${pdfs[@]}" "./release/全系列合集.pdf" 2>&1 && echo "  -> ./release/全系列合集.pdf" || echo "  FAIL: pdfunite all-in-one"
          fi

          # Save errors to file for artifact upload (newline-separated)
          for _f in $FAILED; do echo "$_f"; done > ./release/FAILED.txt
          echo ""
          echo "============================================"
          echo "  Output PDFs:"
          ls -lh ./release/
          echo "============================================"
          if [[ -n "$FAILED" ]]; then
            echo "*** COMPILATION FAILURES: $FAILED ***"
          fi

      - name: Add error report to artifact
        shell: bash
        run: |
          if [[ -s ./release/FAILED.txt ]]; then
            {
              echo "# Release Build Report"
              echo ""
              echo "## Compilation Failures"
              echo ""
              echo '```'
              cat ./release/FAILED.txt
              echo '```'
              echo ""
              echo "## Error Details"
              echo ""
              echo '```'
              cat ./release/ERRORS.txt 2>/dev/null || echo "(no error details)"
              echo '```'
              echo ""
              echo "## Successfully Generated PDFs"
              echo ""
              ls -lh ./release/*.pdf
            } > ./release/BUILD_REPORT.md
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-output
          path: |
            ./release/*.pdf
            ./release/FAILED.txt
            ./release/ERRORS.txt
            ./release/BUILD_REPORT.md

      - name: Generate release notes
        shell: bash
        run: |
          > ./release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          body_path: ./release-notes.md
          files: ./release/*.pdf

      - name: Create Release (manual)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag }}
          body_path: ./release-notes.md
          files: ./release/*.pdf
