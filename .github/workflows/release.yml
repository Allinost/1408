name: Release Courseware
on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-texlive-v1

      - name: Install TeX Live & Chinese fonts
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk

      - name: Debug environment
        shell: bash
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Files ==="
          ls -la
          echo "=== .latexmkrc ==="
          cat .latexmkrc
          echo "=== latexmk version ==="
          latexmk -v | head -1
          echo "=== xelatex version ==="
          xelatex -version | head -1

      - name: Compile release PDFs
        shell: bash
        run: |
          set -e
          mkdir -p ./release
          FAILED=""

          # 1. compile per-module releases
          for f in release_模块*.tex; do
            echo ""
            echo "============================================"
            echo "  Compiling: $f"
            echo "============================================"
            LOGFILE="${f%.tex}.log"
            latexmk -xelatex -interaction=nonstopmode "$f" 2>&1 | tee "$LOGFILE" && echo "OK: $f" || { echo "FAIL: $f"; FAILED="$FAILED $f"; }
            base="${f%.tex}"
            pdf="${base}.pdf"
            module="${base#release_}"
            if [[ -f "$pdf" ]]; then
              cp "$pdf" "./release/${module}.pdf"
              echo "  -> ./release/${module}.pdf"
            else
              echo "  -> NO PDF GENERATED for: $f"
            fi
            echo "=== Last 20 lines of $LOGFILE ==="
            tail -20 "$LOGFILE" 2>/dev/null || true
          done

          # 2. compile all-in-one release
          echo ""
          echo "============================================"
          echo "  Compiling: release.tex (全系列合集)"
          echo "============================================"
          latexmk -xelatex -interaction=nonstopmode release.tex 2>&1 | tee release.log && echo "OK: release.tex" || { echo "FAIL: release.tex"; FAILED="$FAILED release.tex"; }
          if [[ -f "release.pdf" ]]; then
            cp "release.pdf" "./release/全系列合集.pdf"
            echo "  -> ./release/全系列合集.pdf"
          else
            echo "  -> NO PDF GENERATED for: release.tex"
          fi
          echo "=== Last 30 lines of release.log ==="
          tail -30 release.log 2>/dev/null || true

          echo ""
          echo "============================================"
          echo "  Output PDFs:"
          ls -lh ./release/
          echo "============================================"

          if [[ -n "$FAILED" ]]; then
            echo ""
            echo "*** COMPILATION FAILURES: $FAILED ***"
            exit 1
          fi

      - name: Upload compile logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile-logs
          path: |
            release_模块*.log
            release.log

      - name: Generate release notes
        shell: bash
        run: |
          DATE=$(date '+%Y-%m-%d')
          cat > ./release-notes.md << EOF
          # 408考研零基础课程课件

          > 发布日期：$DATE
          > 格式：每模块一个合并 PDF + 全系列合集，覆盖全部 76 课时

          ## 文件清单

          $(for f in ./release/*.pdf; do name=$(basename "$f"); size=$(du -h "$f" | cut -f1); printf "| %s | %s |\n" "$name" "$size"; done)

          | 模块 | 集数 |
          |------|:----:|
          | 模块0_导学 | 4 集 |
          | 模块1_数据结构 | 18 集 |
          | 模块2_计算机组成原理 | 20 集 |
          | 模块3_操作系统 | 16 集 |
          | 模块4_计算机网络 | 14 集 |
          | 模块5_四科串联总结 | 4 集 |
          | **合计** | **76 集** |

          ---
          由 GitHub Actions 自动构建
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          body_path: ./release-notes.md
          files: ./release/*.pdf

      - name: Create Release (manual)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag }}
          body_path: ./release-notes.md
          files: ./release/*.pdf
