name: Compile LaTeX Courseware
on:
  push:
    paths:
      - "模块*/**/*.tex"
      - "beamer_theme_408.sty"
  workflow_dispatch:
    inputs:
      modules:
        description: "Modules to compile (comma-separated, empty=all)"
        required: false
        type: string

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            模块0_导学:
              - "模块0_导学/**"
            模块1_数据结构:
              - "模块1_数据结构/**"
            模块2_计算机组成原理:
              - "模块2_计算机组成原理/**"
            模块3_操作系统:
              - "模块3_操作系统/**"
            模块4_计算机网络:
              - "模块4_计算机网络/**"
            模块5_四科串联总结:
              - "模块5_四科串联总结/**"
            beamer_theme:
              - "beamer_theme_408.sty"

      - name: Determine target modules
        id: target
        shell: bash
        run: |
          ALL_MODULES='["模块0_导学","模块1_数据结构","模块2_计算机组成原理","模块3_操作系统","模块4_计算机网络","模块5_四科串联总结"]'
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.modules }}" ]]; then
              IFS=',' read -ra PARTS <<< "${{ inputs.modules }}"
              echo "modules=$(printf '%s\n' "${PARTS[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
            else
              echo "modules=$ALL_MODULES" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ steps.filter.outputs.beamer_theme }}" == "true" ]]; then
            echo "modules=$ALL_MODULES" >> $GITHUB_OUTPUT
          else
            echo "modules=${{ steps.filter.outputs.changes }}" >> $GITHUB_OUTPUT
          fi

      - name: Install TeX Live & Chinese fonts
        if: ${{ steps.target.outputs.modules != '[]' && steps.target.outputs.modules != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk

      - name: Compile changed modules sequentially
        if: ${{ steps.target.outputs.modules != '[]' && steps.target.outputs.modules != '' }}
        shell: bash
        run: |
          MODULES='${{ steps.target.outputs.modules }}'
          for module in $(echo "$MODULES" | jq -r '.[]'); do
            echo ""
            echo "============================================"
            echo "  Compiling: $module"
            echo "============================================"
            cd "$module"
            for f in *.tex; do
              echo "--- $f ---"
              latexmk -xelatex -interaction=nonstopmode "$f" && echo "OK: $f" || echo "FAIL: $f"
            done
            cd ..
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: courseware-pdfs
          path: |
            模块0_导学/*.pdf
            模块1_数据结构/*.pdf
            模块2_计算机组成原理/*.pdf
            模块3_操作系统/*.pdf
            模块4_计算机网络/*.pdf
            模块5_四科串联总结/*.pdf
