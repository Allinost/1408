name: Compile All LaTeX Courseware
on:
  push:
    paths:
      - "模块*/**/*.tex"
      - "beamer_theme_408.sty"
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - 模块0_导学
          - 模块1_数据结构
          - 模块2_计算机组成原理
          - 模块3_操作系统
          - 模块4_计算机网络
          - 模块5_四科串联总结
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live & Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-lang-chinese \
            latexmk \
            fonts-noto-cjk

      - name: Compile all .tex files
        shell: bash
        run: |
          for f in *.tex; do
            echo "=== Compiling: $f ==="
            latexmk -xelatex -interaction=nonstopmode "$f" && echo "OK: $f" || echo "FAIL: $f"
          done
        working-directory: ./${{ matrix.module }}

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}
          path: ./${{ matrix.module }}/*.pdf
